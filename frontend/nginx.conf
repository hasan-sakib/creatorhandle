server {
  listen 80;

  location /creator/ {
    alias /usr/share/nginx/creator-site/;
    try_files $uri /creator/index.html;
  }

  location / {
    root /usr/share/nginx/creator-workspace/;
    index index.html index.htm;
    try_files $uri /index.html =404;
  }

  location /api { return 404; }
  location /docs { return 404; }
  location /redoc { return 404; }
}
